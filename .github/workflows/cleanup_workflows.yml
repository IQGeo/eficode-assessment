name: Cleanup Workflows
on: [workflow_dispatch]
jobs:
  do:
    runs-on: ubuntu-latest
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@1544db1aad28a3bad01a5e942f7370f65fd46e52
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0